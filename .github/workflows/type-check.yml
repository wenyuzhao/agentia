name: Pyright Type Checks

on: [ push, pull_request ]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Install UV
        uses: astral-sh/setup-uv@v5
      - name: Install Packages
        run: |
          sudo apt-get install -y libomp-dev libasound-dev portaudio19-dev libportaudio2 libportaudiocpp0 ffmpeg
          uv venv
          uv sync --all-extras --all-groups --all-packages --frozen
      - name: Run Pyright
        run: uv run pyright
      - name: Run format check
        run: uv run ruff check --check
      - name: Run lint check
        run: uv run ruff check
